<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой день — трекер задач</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F1EDE4;
    --paper-raised: #FBF9F3;
    --ink: #20241D;
    --ink-soft: #55584C;
    --ink-faint: #918D7D;
    --line: #D9D3C0;
    --accent: #2F6F5E;
    --accent-soft: #DCEAE4;
    --accent-deep: #1F4A3F;
    --now: #C97D3C;
    --now-soft: #F3E1CC;
  }

  * { box-sizing: border-box; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 4vh 20px;
  }

  .page {
    max-width: 640px;
    margin: 0 auto;
  }

  .masthead {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--line);
  }

  .masthead h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 30px;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .masthead .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-faint);
    text-transform: lowercase;
  }

  .card {
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1.75rem;
    margin-bottom: 1.25rem;
  }

  .day-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .day-nav-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .day-btn {
    width: 30px;
    height: 30px;
    border: 1px solid var(--line);
    background: transparent;
    border-radius: 50%;
    color: var(--ink);
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .day-btn:hover { background: var(--accent-soft); border-color: var(--accent); }

  .date-label {
    font-family: 'Fraunces', serif;
    font-size: 19px;
    font-weight: 500;
  }

  .date-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 2px;
  }

  .progress-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 500;
    color: var(--accent-deep);
    text-align: right;
  }
  .progress-sub {
    font-size: 12px;
    color: var(--ink-faint);
    text-align: right;
  }

  .timebar-wrap {
    position: relative;
    height: 54px;
    margin-bottom: 4px;
  }
  .timebar-track {
    position: absolute;
    top: 24px; left: 0; right: 0;
    height: 3px;
    background: var(--line);
    border-radius: 2px;
  }
  .timebar-fill {
    position: absolute;
    top: 24px; left: 0;
    height: 3px;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s;
  }
  .now-marker {
    position: absolute;
    top: 14px;
    width: 2px;
    height: 22px;
    background: var(--now);
  }
  .dots-layer {
    position: absolute;
    top: 0; left: 0; right: 0; height: 54px;
  }
  .tick-row {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    margin-bottom: 1.75rem;
  }

  .add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 0.25rem;
  }

  input[type="text"], input[type="time"] {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 9px 12px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: var(--paper);
    color: var(--ink);
  }
  input[type="text"] { flex: 1; }
  input[type="time"] { width: 118px; font-family: 'JetBrains Mono', monospace; }
  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

  button.add-btn {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 9px 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  button.add-btn:hover { background: var(--accent-deep); }

  .task-list { margin-top: 1.25rem; }
  .task-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 2px;
    border-bottom: 1px solid var(--line);
  }
  .task-row:last-child { border-bottom: none; }

  .task-row input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--accent);
    flex-shrink: 0;
    cursor: pointer;
  }

  .task-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-faint);
    width: 42px;
    flex-shrink: 0;
  }

  .task-text {
    flex: 1;
    font-size: 14.5px;
  }
  .task-text.done {
    color: var(--ink-faint);
    text-decoration: line-through;
  }

  .task-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .task-status.yes {
    background: var(--accent-soft);
    color: var(--accent-deep);
  }
  .task-status.no {
    background: var(--paper);
    color: var(--ink-faint);
    border: 1px solid var(--line);
  }

  .task-del {
    border: none;
    background: transparent;
    color: var(--ink-faint);
    cursor: pointer;
    font-size: 16px;
    width: 26px;
    height: 26px;
    border-radius: 3px;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }
  .task-del:hover { background: #F3DCD4; color: #A13F27; }

  .empty-state {
    text-align: center;
    padding: 2.5rem 0;
    color: var(--ink-faint);
    font-size: 14px;
  }

  .footer-note {
    text-align: center;
    font-size: 11.5px;
    color: var(--ink-faint);
    margin-top: 1.5rem;
    font-family: 'JetBrains Mono', monospace;
  }

  @media (max-width: 520px) {
    body { padding: 0; }

    .page { max-width: 100%; }

    .masthead {
      padding: 20px 16px 14px;
      margin-bottom: 0;
      background: var(--paper-raised);
      border-bottom: 1px solid var(--line);
    }
    .masthead h1 { font-size: 24px; }

    .card {
      border-left: none;
      border-right: none;
      border-radius: 0;
      margin-bottom: 0;
      padding: 1.25rem 16px 1.75rem;
    }

    .day-nav { margin-bottom: 1.25rem; }
    .day-nav-left { gap: 8px; }
    .date-label { font-size: 17px; }
    .progress-num { font-size: 22px; }

    .day-btn {
      width: 34px;
      height: 34px;
    }

    .tick-row { margin-bottom: 1.5rem; }

    .add-row {
      flex-wrap: wrap;
    }
    input[type="text"] {
      flex-basis: 100%;
      font-size: 16px;
      padding: 11px 12px;
    }
    input[type="time"] {
      flex: 1;
      width: auto;
      font-size: 15px;
      padding: 11px 10px;
    }
    button.add-btn {
      flex: 1;
      padding: 11px 16px;
      font-size: 15px;
    }

    .task-row {
      flex-wrap: wrap;
      padding: 12px 2px;
    }
    .task-row input[type="checkbox"] {
      width: 20px;
      height: 20px;
    }
    .task-text {
      flex-basis: calc(100% - 32px);
      order: 1;
    }
    .task-time { order: 0; }
    .task-status {
      order: 2;
      margin-left: 32px;
      margin-top: 4px;
    }
    .task-del {
      order: 3;
      margin-left: auto;
      margin-top: 4px;
      width: 32px;
      height: 32px;
      font-size: 18px;
    }

    .footer-note { padding: 0 16px 24px; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="masthead">
    <h1>Мой день</h1>
    <span class="tag">трекер задач</span>
  </div>

  <div class="card">
    <div class="day-nav">
      <div class="day-nav-left">
        <button class="day-btn" id="prevDay" aria-label="Предыдущий день">‹</button>
        <div>
          <div class="date-label" id="dateLabel">Сегодня</div>
          <div class="date-sub" id="dateSub"></div>
        </div>
        <button class="day-btn" id="nextDay" aria-label="Следующий день">›</button>
      </div>
      <div>
        <div class="progress-num" id="progressPct">0%</div>
        <div class="progress-sub" id="progressSub">0 из 0 выполнено</div>
      </div>
    </div>

    <div class="timebar-wrap">
      <div class="timebar-track"></div>
      <div class="timebar-fill" id="barFill"></div>
      <div class="now-marker" id="nowMarker"></div>
      <div class="dots-layer" id="dotsLayer"></div>
    </div>
    <div class="tick-row">
      <span>06:00</span><span>12:00</span><span>18:00</span><span>24:00</span>
    </div>

    <div class="add-row">
      <input type="text" id="taskInput" placeholder="Новая задача">
      <input type="time" id="timeInput">
      <button class="add-btn" id="addBtn">Добавить</button>
    </div>

    <div class="task-list" id="taskList"></div>
    <div class="empty-state" id="emptyState">На сегодня задач нет. Добавь первую.</div>
  </div>

  <div class="footer-note">данные хранятся локально в этом браузере</div>
</div>

<script>
(function(){
  function pad(n){ return n < 10 ? '0' + n : '' + n; }
  function dateKey(d){ return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()); }

  function fmtLabel(d, today){
    var diff = Math.round((new Date(dateKey(d)) - new Date(dateKey(today))) / 86400000);
    if(diff === 0) return 'Сегодня';
    if(diff === -1) return 'Вчера';
    if(diff === 1) return 'Завтра';
    var days = ['вс','пн','вт','ср','чт','пт','сб'];
    return days[d.getDay()] + ', ' + d.getDate() + '.' + pad(d.getMonth()+1);
  }

  function fmtSub(d){
    var months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
  }

  var today = new Date();
  var current = new Date();
  var tasks = [];
  var dayStartH = 6, dayEndH = 24, spanH = dayEndH - dayStartH;

  function timeToPct(hh, mm){
    var h = hh + mm / 60;
    return Math.max(0, Math.min(100, (h - dayStartH) / spanH * 100));
  }

  function uid(){ return 't' + Date.now() + Math.random().toString(36).slice(2,7); }

  function storageKey(){ return 'daytracker:' + dateKey(current); }

  function load(){
    try {
      var raw = localStorage.getItem(storageKey());
      tasks = raw ? JSON.parse(raw) : [];
    } catch(e) {
      tasks = [];
    }
    render();
  }

  function save(){
    try {
      localStorage.setItem(storageKey(), JSON.stringify(tasks));
    } catch(e) {}
  }

  function updateNowMarker(){
    var marker = document.getElementById('nowMarker');
    var isToday = dateKey(current) === dateKey(new Date());
    if(!isToday){ marker.style.display = 'none'; return; }
    var now = new Date();
    if(now.getHours() < dayStartH){ marker.style.display = 'none'; return; }
    marker.style.display = 'block';
    var pct = timeToPct(now.getHours(), now.getMinutes());
    marker.style.left = 'calc(' + pct + '% - 1px)';
  }

  function render(){
    document.getElementById('dateLabel').textContent = fmtLabel(current, today);
    document.getElementById('dateSub').textContent = fmtSub(current);

    var sorted = tasks.slice().sort(function(a,b){
      if(!a.time && !b.time) return 0;
      if(!a.time) return 1;
      if(!b.time) return -1;
      return a.time.localeCompare(b.time);
    });

    var done = tasks.filter(function(t){ return t.done; }).length;
    var total = tasks.length;
    var pct = total ? Math.round(done / total * 100) : 0;

    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('progressSub').textContent = done + ' из ' + total + ' выполнено';
    document.getElementById('barFill').style.width = pct + '%';

    var dotsLayer = document.getElementById('dotsLayer');
    dotsLayer.innerHTML = '';
    tasks.forEach(function(t){
      if(!t.time) return;
      var parts = t.time.split(':');
      var p = timeToPct(parseInt(parts[0],10), parseInt(parts[1],10));
      var dot = document.createElement('div');
      dot.title = t.text;
      dot.style.position = 'absolute';
      dot.style.top = '19px';
      dot.style.left = 'calc(' + p + '% - 5px)';
      dot.style.width = '10px';
      dot.style.height = '10px';
      dot.style.borderRadius = '50%';
      dot.style.background = t.done ? '#2F6F5E' : '#FBF9F3';
      dot.style.border = '2px solid #2F6F5E';
      dotsLayer.appendChild(dot);
    });

    var list = document.getElementById('taskList');
    list.innerHTML = '';
    document.getElementById('emptyState').style.display = total ? 'none' : 'block';

    sorted.forEach(function(t){
      var row = document.createElement('div');
      row.className = 'task-row';

      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = !!t.done;
      cb.setAttribute('aria-label', 'Отметить задачу выполненной');
      cb.addEventListener('change', function(){
        t.done = cb.checked;
        save();
        render();
      });
      row.appendChild(cb);

      var time = document.createElement('span');
      time.className = 'task-time';
      time.textContent = t.time || '';
      row.appendChild(time);

      var text = document.createElement('span');
      text.className = 'task-text' + (t.done ? ' done' : '');
      text.textContent = t.text;
      row.appendChild(text);

      var status = document.createElement('span');
      status.className = 'task-status ' + (t.done ? 'yes' : 'no');
      status.textContent = t.done ? 'выполнено' : 'не выполнено';
      row.appendChild(status);

      var del = document.createElement('button');
      del.className = 'task-del';
      del.setAttribute('aria-label', 'Удалить задачу');
      del.textContent = '×';
      del.addEventListener('click', function(){
        tasks = tasks.filter(function(x){ return x.id !== t.id; });
        save();
        render();
      });
      row.appendChild(del);

      list.appendChild(row);
    });

    updateNowMarker();
  }

  document.getElementById('addBtn').addEventListener('click', function(){
    var input = document.getElementById('taskInput');
    var timeInput = document.getElementById('timeInput');
    var text = input.value.trim();
    if(!text) return;
    tasks.push({ id: uid(), text: text, time: timeInput.value || null, done: false });
    input.value = '';
    timeInput.value = '';
    save();
    render();
    input.focus();
  });

  document.getElementById('taskInput').addEventListener('keydown', function(e){
    if(e.key === 'Enter') document.getElementById('addBtn').click();
  });

  document.getElementById('prevDay').addEventListener('click', function(){
    current.setDate(current.getDate() - 1);
    load();
  });
  document.getElementById('nextDay').addEventListener('click', function(){
    current.setDate(current.getDate() + 1);
    load();
  });

  setInterval(updateNowMarker, 60000);
  load();
})();
</script>

</body>
</html>
